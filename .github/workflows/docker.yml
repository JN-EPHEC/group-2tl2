name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Tests automatiques
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Installer les dépendances
        run: npm ci
        working-directory: server

      - name: Lancer les tests Jest
        run: npm test
        working-directory: server

  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push image serveur
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: louiskle/skidev2-server:latest

      - name: Build & push image client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: louiskle/skidev2-client:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

      - name: SSH — update les containers
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port : 54321
          script: |
            docker pull louiskle/skidev2-server:latest
            docker pull louiskle/skidev2-client:latest
            docker stop skidev2-server || true
            docker stop skidev2-client || true
            docker rm skidev2-server || true
            docker rm skidev2-client || true
            docker run -d --name skidev2-server -p 3000:3000 --env-file /home/user/.env louiskle/skidev2-server:latest
            docker run -d --name skidev2-client -p 82:80 louiskle/skidev2-client:latest